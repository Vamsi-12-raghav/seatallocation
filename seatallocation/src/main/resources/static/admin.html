<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - Smart Exam Seating Allocation System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <script>
    // Load theme preference on page load
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>
  <div class="page-bg"></div>
  <main class="container py-4">
    <nav class="page-nav">
      <div class="hero-badge">Admin</div>
      <div class="d-flex gap-2">
        <a class="nav-link-pill" href="student.html">Student Seat Lookup</a>
        <a class="nav-link-pill" href="manage.html">Admin Management</a>
        <a class="nav-link-pill" href="dashboards.html">Dashboards</a>
        <button id="themeToggleBtn" class="btn btn-outline-secondary" title="Toggle Dark/Light Mode">🌙 Dark</button>
        <button id="logoutBtn" class="btn btn-outline-secondary">Logout</button>
      </div>
    </nav>

    <header class="hero-card mb-4">
      <div>
        <h1 class="display-6 fw-bold">Admin Home</h1>
        <p class="lead mb-0">Use the links below to manage students, halls, and seating.</p>
      </div>
      <div class="hero-badge">Home</div>
    </header>

    <section class="row g-4">
      <div class="col-lg-6">
        <div class="card glass-card h-100">
          <div class="card-body">
            <h5 class="card-title">Management</h5>
            <p class="text-muted">Add students and exam halls, then allocate seating.</p>
            <a class="btn btn-outline-secondary" href="manage.html">Open Admin Management</a>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card glass-card h-100">
          <div class="card-body">
            <h5 class="card-title">Dashboards</h5>
            <p class="text-muted">View students, exam halls, and seating allocation.</p>
            <a class="btn btn-outline-secondary" href="dashboards.html">Open Dashboards</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
